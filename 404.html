<!doctype html>

<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!--Google Fonts: JetBrains Mono & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
      rel="stylesheet"
    />
    <!--Bootstrap CSS-->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!--Bootstrap JS-->
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <!--Custom CSS-->
    <link href="/styles.css" rel="stylesheet" />
    <!--Custom JS-->
    <script defer src="/scripts.js"></script>
    <!--Website Title & Logo-->
    <title>404 | Ahmad Mollaei</title>
    <link rel="icon" type="image/png" href="/assets/images/logo_tab.png" />
  </head>

  <body class="d-flex flex-column min-vh-100 m-0">
    <!--Header-->
    <header id="site-header"></header>

    <!--Fixed SideBars-->
    <div id="site-sidebars"></div>

    <!--Main-->
    <main class="flex-grow-1">
      <section
        class="hero-section container d-flex flex-column justify-content-center align-items-start"
      >
        <!--Error Code-->
        <p class="font-monospace mb-2 not-found-label">
          <span class="not-found-accent">></span> ERROR
        </p>

        <!-- 404-->
        <h1 class="display-1 fw-bold font-monospace mb-3 not-found-code">
          404
        </h1>

        <!-- Tagline -->
        <h2 class="fw-bold mb-3 not-found-heading">Page not found.</h2>

        <!-- Message -->
        <p class="mb-5 not-found-desc" style="max-width: 480px">
          Even my multi-agent system couldn't locate this one. The page you're
          looking for doesn't exist, was moved, or never made it past the strict
          protocol loop.
        </p>

        <!-- Suggestion block -->
        <div class="font-monospace not-found-terminal mb-5 p-4">
          <p class="mb-1 not-found-comment"># suggestion fix:</p>
          <p class="mb-0">
            <span class="not-found-accent">$</span>
            <a href="/" class="not-found-cmd ms-2">cd ~/home</a>
          </p>
        </div>

        <!-- Back button-->
        <a class="btn btn-resume btn-lg font-monospace px-4 py-3" href="/">
          Back to Home
        </a>
      </section>
    </main>

    <!--Footer-->
    <div id="site-chrome-bottom"></div>
  </body>
</html>
