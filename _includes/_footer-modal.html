<!-- Resume Download Popup (Modal)-->
<div
  class="modal fade"
  id="resumeModal"
  role="dialog"
  data-bs-backdrop="static"
  data-bs-keyboard="false"
  tabindex="-1"
  aria-labelledby="resumeModalLabel"
  aria-hidden="true"
>
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-secondary border-opacity-25">
      <!-- Modal Header-->
      <div
        class="modal-header border-bottom border-secondary border-opacity-10"
      >
        <h4
          class="modal-title font-monospace h6 text-uppercase"
          id="resumeModalLabel"
        >
          Download CV
        </h4>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
          aria-label="Close"
        ></button>
      </div>

      <!-- Modal Body-->
      <div class="modal-body text-muted small py-4">
        Would you like to download a copy of my technical CV in PDF format?
      </div>

      <!--Modal Footer with Action Buttons -->
      <div
        class="modal-footer border-top border-secondary border-opacity-10 justify-content-end gap-2 p-3"
      >
        <button
          type="button"
          class="btn btn-sm btn-link text-muted text-decoration-none font-monospace small"
          data-bs-dismiss="modal"
        >
          Cancel
        </button>
        <a
          href="/assets/pdf/cv.pdf"
          download="Ahmad_Mollaei_CV.pdf"
          class="btn btn-sm btn-resume font-monospace px-3 py-2"
        >
          Download PDF
        </a>
      </div>
    </div>
  </div>
</div>
